name: Auto-update meet and greet events

on:
  schedule:
    - cron: '0 8 * * 0'     # every Sunday at 08:00 UTC
  workflow_dispatch:          # also allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push the updated JSON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-events.js
        env:
          SERPAPI_KEY_1: ${{ secrets.SERPAPI_KEY_1 }}

      - name: Inject static HTML + update sitemap lastmod
        run: node scripts/inject-static-html.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-events.json index.html sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update live events + static HTML $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
